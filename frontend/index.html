<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mind Map</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <div class="toolbar-left">
        <h1>Mind Map</h1>
      </div>
      <div class="toolbar-right">
        <span id="stats"></span>
        <button id="btn-overview" title="Project overview (O)">Overview</button>
        <button id="btn-fit" title="Fit to screen (F)">Fit</button>
        <button id="btn-zoom-in" title="Zoom in (+)">+</button>
        <button id="btn-zoom-out" title="Zoom out (-)">&#x2212;</button>
      </div>
    </header>
    <main id="viewport">
      <div id="canvas">
        <svg id="edges-svg" xmlns="http://www.w3.org/2000/svg"></svg>
        <div id="nodes-layer"></div>
      </div>
    </main>
    <div id="tooltip" class="hidden"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
